name: changelog Check 103
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: cd sdk && npm ci || true
      - run: cd frontend && npm ci || true
      - name: TypeScript check
        run: npx tsc --noEmit || true
      - name: SDK type check
        run: cd sdk && npx tsc --noEmit || true
      - name: Run tests
        run: npx vitest run --reporter=verbose || true
        env:
          CI: true
