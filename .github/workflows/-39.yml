name:  Check 39

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  -check:
    name: Run  checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install SDK dependencies
        run: cd sdk && npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: TypeScript compilation check
        run: npx tsc --noEmit --project tsconfig.json || true

      - name: SDK type check
        run: cd sdk && npx tsc --noEmit || true

      - name: Run unit tests
        run: npx vitest run --reporter=verbose || true
        env:
          CI: true
