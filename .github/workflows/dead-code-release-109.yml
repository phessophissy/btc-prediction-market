name: Release 109
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && cd sdk && npm ci
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: true
